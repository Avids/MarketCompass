name: Scheduled Daily Data Collection

on:
  schedule:
    # Run everyday at 21:00 UTC (5:00 PM EST, covering market close)
    - cron: '0 21 * * *'
  workflow_dispatch: # Enable running manually via GitHub Actions UI

permissions:
  contents: write # Allows pushing the data.json commit

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance requests

      - name: Run Data Collection Script
        run: |
          python update_data.py

      - name: Commit and Push Updated Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update dashboard data [skip ci]" && git push)
